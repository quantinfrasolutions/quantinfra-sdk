name: Publish NuGet packages

on:
  push:
    tags:
      - "backtesting-v*"

jobs:
  tests:
    uses: ./.github/workflows/run-unit-tests.yml
    
  publish:
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Extract package version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ "$TAG" =~ ^backtesting-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Invalid tag: $TAG"
            exit 1
          fi          
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore      

      - name: Pack SDK package
        run: |
          dotnet pack ./src/QuantInfra.Sdk.Backtesting/QuantInfra.Sdk.Backtesting.csproj \
            --configuration Release \
            -p:NuspecFile=QuantInfra.Sdk.Backtesting.nuspec \
            -p:NuspecProperties="version=$PACKAGE_VERSION" \
            -o ./artifacts/packages

      - name: NuGet trusted publishing login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push "./artifacts/packages/*.nupkg" \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate